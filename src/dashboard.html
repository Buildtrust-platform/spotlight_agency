<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agency Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{--ink:#1B2240;--cream:#F4ECD8;--glow:#F2C14E;--clay:#C9714E;--muted:#6b7280;--line:#e6e1d3}
  *{box-sizing:border-box}
  body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--cream)}
  header{padding:20px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px}
  header h1{font-size:18px;margin:0;font-weight:700}
  header .meta{font-size:12px;color:var(--muted);margin-left:auto}
  .wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;height:calc(100vh - 61px)}
  .panel{padding:22px 28px;overflow:auto}
  .left{border-right:1px solid var(--line)}
  label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  textarea{width:100%;min-height:160px;margin-top:8px;padding:12px;border:1px solid var(--line);border-radius:10px;font:inherit;resize:vertical;background:#fff}
  button{margin-top:12px;background:var(--ink);color:#fff;border:0;border-radius:10px;padding:11px 18px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  .feed{margin-top:18px;font-size:13px;line-height:1.5}
  .ev{padding:7px 10px;border-radius:8px;margin:6px 0;background:#fff;border:1px solid var(--line);display:flex;gap:8px;align-items:baseline}
  .ev .who{font-weight:600}
  .ev.delegate{background:#fff7e6;border-color:#f3e2b3}
  .ev.tool .tname{color:var(--clay);font-family:ui-monospace,monospace;font-size:12px}
  .ev.gated{background:#fdeee9;border-color:#f3cdbe}
  .badge{font-size:11px;padding:1px 7px;border-radius:999px;background:var(--glow);color:#3a2c00;font-weight:700}
  h2{font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 10px}
  .files a{display:block;padding:9px 12px;border:1px solid var(--line);border-radius:8px;margin:6px 0;background:#fff;color:var(--ink);text-decoration:none;font-size:13px}
  .files a:hover{border-color:var(--clay)}
  .files a .new{font-size:10px;color:#fff;background:var(--clay);border-radius:4px;padding:1px 5px;margin-left:6px}
  .doc{background:#fff;border:1px solid var(--line);border-radius:10px;padding:20px 24px;margin-top:12px}
  .doc h1{font-size:22px} .doc h2{font-size:17px;color:var(--ink);text-transform:none;letter-spacing:0}
  .doc table{border-collapse:collapse;width:100%} .doc th,.doc td{border:1px solid var(--line);padding:6px 9px;text-align:left;font-size:13px}
  .doc code{background:#f3efe3;padding:1px 5px;border-radius:4px}
  .warn{background:#fdeee9;border:1px solid #f3cdbe;border-radius:8px;padding:10px 12px;font-size:13px;margin-top:10px}
  .spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--glow);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:820px){.wrap{grid-template-columns:1fr;height:auto}.left{border-right:0;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<header>
  <h1>◐ Agency Dashboard</h1>
  <span class="meta" id="meta">loading…</span>
</header>
<div class="wrap">
  <div class="panel left">
    <label for="brief">Client brief</label>
    <textarea id="brief" placeholder="Describe the client, goal, audience, budget, tone…"></textarea>
    <button id="run">Run the agency</button>
    <div id="status"></div>
    <div class="feed" id="feed"></div>
  </div>
  <div class="panel right">
    <h2>Deliverables</h2>
    <div class="files" id="files"><p style="color:var(--muted);font-size:13px">Run a brief to generate deliverables — they'll appear here, click to read.</p></div>
    <div id="viewer"></div>
  </div>
</div>
<script>
const $ = (id) => document.getElementById(id);
const SAMPLE = `Client: Moonmilk — a new direct-to-consumer barista oat milk.
Goal: launch in 8 weeks to urban specialty-coffee drinkers (25-40), build an email list, and land wholesale meetings with independent cafes.
Budget: lean. Tone: warm, witty, design-forward. We have no brand identity yet.`;
$("brief").value = SAMPLE;

fetch("/api/config").then(r=>r.json()).then(c=>{
  $("meta").textContent = `${c.model} · effort ${c.effort} · ${c.safeMode ? "SCAFFOLD (no live actions)" : "LIVE"}`;
  if(!c.hasKey){ $("status").innerHTML = '<div class="warn">⚠ No ANTHROPIC_API_KEY set on the server — set it and restart to run.</div>'; }
});

function evHtml(e){
  if(e.type==="delegate") return `<div class="ev delegate"><span class="who">→ ${esc(e.team)}</span><span>team engaged</span></div>`;
  if(e.type==="tool"){
    const gated = ["search_prospects","queue_outreach","generate_visual_asset","schedule_content","sync_to_workspace"].includes(e.name);
    return `<div class="ev tool ${gated?'gated':''}"><span class="who">${esc(e.agent)}</span><span class="tname">${esc(e.name)}</span>${gated?'<span class="badge">gated</span>':''}</div>`;
  }
  if(e.type==="error") return `<div class="ev gated"><span class="who">${esc(e.agent||'')}</span><span>error: ${esc(e.message||'')}</span></div>`;
  return "";
}
const esc = (s)=>String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

$("run").onclick = () => {
  const brief = $("brief").value.trim();
  $("run").disabled = true;
  $("feed").innerHTML = ""; $("viewer").innerHTML = "";
  $("status").innerHTML = '<div style="margin-top:10px;font-size:13px"><span class="spinner"></span> Agents working… (a full run takes a few minutes)</div>';
  const es = new EventSource("/api/run?brief=" + encodeURIComponent(brief));
  es.addEventListener("event", (m)=>{ const e=JSON.parse(m.data); const h=evHtml(e); if(h){ $("feed").insertAdjacentHTML("beforeend",h); $("feed").lastChild.scrollIntoView({block:"nearest"}); }});
  es.addEventListener("done", (m)=>{
    const d = JSON.parse(m.data);
    $("status").innerHTML = '<div style="margin-top:10px;font-size:13px;color:#15803d">✓ Done — '+d.files.length+' deliverables</div>';
    renderFiles(d.files);
    $("viewer").innerHTML = '<h2 style="margin-top:22px">Executive summary</h2><div class="doc">'+marked.parse(d.summary||"")+'</div>';
    es.close(); $("run").disabled = false;
  });
  es.addEventListener("error", (m)=>{
    let msg="connection closed"; try{ msg=JSON.parse(m.data).message }catch{}
    $("status").innerHTML = '<div class="warn">✗ '+esc(msg)+'</div>'; es.close(); $("run").disabled=false;
  });
};

function renderFiles(files){
  $("files").innerHTML = files.map(f=>`<a href="#" data-p="${esc(f.path)}">${esc(f.path)}${f.isNew?'<span class="new">new</span>':''}</a>`).join("") || "<p>No files.</p>";
  $("files").querySelectorAll("a").forEach(a=>a.onclick=(ev)=>{
    ev.preventDefault();
    fetch("/api/file?path="+encodeURIComponent(a.dataset.p)).then(r=>r.text()).then(t=>{
      const isMd = a.dataset.p.endsWith(".md");
      $("viewer").innerHTML = '<div class="doc">'+(isMd?marked.parse(t):'<pre>'+esc(t)+'</pre>')+'</div>';
      $("viewer").scrollIntoView({behavior:"smooth",block:"start"});
    });
  });
}
</script>
</body>
</html>
